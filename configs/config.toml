siteUrl = "https://solian.app"

[cache]
serializer = "JSON"

[nats]
url = "nats://nats:RE0zx7Qtady3Akyrn6eZXF@localhost:63769"
websocketSubjectPrefix = "websocket_"

[services]
ring = { http = "http://localhost:8001", grpc = "localhost:7002" }
pass = { http = "http://localhost:8002", grpc = "localhost:7003" }
drive = { http = "http://localhost:8003", grpc = "localhost:7004" }
sphere = { http = "http://localhost:8004", grpc = "localhost:7005" }
develop = { http = "http://localhost:8005", grpc = "localhost:7006" }
insight = { http = "http://localhost:8006", grpc = "localhost:7007" }
zone = { http = "http://localhost:8007", grpc = "localhost:7008" }
messager = { http = "http://localhost:8008", grpc = "localhost:7009" }
wallet = { http = "http://localhost:8009", grpc = "localhost:7010" }

[endpoints]
serviceNames = [
    "ring",
    "pass",
    "drive",
    "sphere",
    "develop",
    "insight",
    "zone",
    "messager",
    "wallet",
    "ideask",
]
coreServiceNames = ["ring", "pass", "drive", "sphere"]

[rateLimit]
requestsPerMinute = 120
burstAllowance = 10

[health]
checkIntervalSeconds = 10

[server]
port = "6000"
readTimeout = 60
writeTimeout = 60

[grpcServer]
enabled = true
port = "7001"

[websocketGateway]
enabled = true
path = "/ws"
authService = "pass"
authUseTLS = true
authTlsSkipVerify = true
keepAliveSeconds = 60
maxMessageBytes = 4096
allowedDeviceAlternatives = ["watch"]

[[specialRoutes.routes]]
path = "/.well-known/openid-configuration"
service = "pass"
target = "/auth/.well-known/openid-configuration"
prefix = false

[[specialRoutes.routes]]
path = "/.well-known/jwks"
service = "pass"
target = "/auth/.well-known/jwks"
prefix = false

[[specialRoutes.routes]]
path = "/.well-known/webfinger"
service = "sphere"
target = "/fediverse/.well-known/webfinger"
prefix = false

[[specialRoutes.routes]]
path = "/activitypub"
service = "sphere"
target = "/activitypub"
prefix = true

[[specialRoutes.routes]]
path = "/api/activitypub"
service = "sphere"
target = "/activitypub"
prefix = true
